name: CI
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --disable-pip-version-check -e . ruff mypy
      - run: python -m compileall src tests
      - run: python -m unittest discover
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: bash -n bootstrap/install
      - run: shellcheck bootstrap/install

  arch:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4
      - run: pacman -Syu --noconfirm python git shellcheck
      - run: python -m compileall src tests
      - run: python -m unittest discover
      - run: bash -n bootstrap/install
