name: CI
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --disable-pip-version-check -e . ruff mypy
      - run: python -m compileall src tests tools
      - run: python -m unittest discover
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src
      - run: mypy tools
      - run: python tools/build_release.py --tag v0.2.1 --check-only
      - run: git diff --check

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: bash -n bootstrap/install.in
      - run: shellcheck bootstrap/install.in

  arch:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - run: pacman -Syu --noconfirm python git shellcheck sudo curl flatpak
      - uses: actions/checkout@v7
      - run: useradd --create-home omfg-ci
      - run: su omfg-ci -c "cp -R '$GITHUB_WORKSPACE' /tmp/omfg-ci-source"
      - run: su omfg-ci -c "cd /tmp/omfg-ci-source && python -m compileall src tests tools"
      - run: su omfg-ci -c "cd /tmp/omfg-ci-source && PYTHONPATH=src python -m unittest discover"
      - run: bash -n bootstrap/install.in
      - run: su omfg-ci -c "python -m venv /tmp/omfg-ci-venv"
      - run: su omfg-ci -c "/tmp/omfg-ci-venv/bin/python -m pip install --disable-pip-version-check --no-deps /tmp/omfg-ci-source"
      - run: su omfg-ci -c "/tmp/omfg-ci-venv/bin/omfg --help"
      - run: su omfg-ci -c "/tmp/omfg-ci-venv/bin/omfg --version"
      - run: su omfg-ci -c "/tmp/omfg-ci-venv/bin/omfg --dry-run"
      - run: su omfg-ci -c "/tmp/omfg-ci-venv/bin/omfg apps browser --dry-run"
      - run: su omfg-ci -c "/tmp/omfg-ci-venv/bin/omfg github --dry-run"
      - run: su omfg-ci -c "/tmp/omfg-ci-venv/bin/omfg codex --dry-run"
      - name: Verify incomplete status is read-only
        run: |
          find /home/omfg-ci -xdev -printf '%P\t%m\t%s\t%T@\n' | sort > /tmp/status-before
          set +e
          su omfg-ci -c "/tmp/omfg-ci-venv/bin/omfg status" > /tmp/status-output 2>&1
          status=$?
          set -e
          test "$status" -eq 1
          grep -Fx 'Status' /tmp/status-output
          grep -Fx 'Workstation is not ready.' /tmp/status-output
          if grep -E 'Traceback|\[sudo\]|Continue\?|Setup complete\.' /tmp/status-output; then
            exit 1
          fi
          if grep -Fx 'Plan' /tmp/status-output; then
            exit 1
          fi
          find /home/omfg-ci -xdev -printf '%P\t%m\t%s\t%T@\n' | sort > /tmp/status-after
          cmp /tmp/status-before /tmp/status-after
